services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: goia_postgres
    environment:
      POSTGRES_DB: goia_db
      POSTGRES_USER: goia_user
      POSTGRES_PASSWORD: dbb856f39879cded55e1d34fe143a515
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    container_name: goia-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  api:
    build: .
    container_name: goia-api
    ports:
      - "5090:8080"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app_network

volumes:
  redis_data:
  postgres_data:

networks:
  app_network:
    driver: bridge
